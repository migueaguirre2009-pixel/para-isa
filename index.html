<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Isabella 🩵</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Caveat:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        :root {
            --celeste: #b3e5fc;
            --azul-brillante: #4fc3f7;
            --fondo-oscuro: #050505;
            --cristal: rgba(255, 255, 255, 0.1);
            --fuente-elegante: 'Great Vibes', cursive;
            --fuente-manuscrita: 'Caveat', cursive;
            --fuente-lectura: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; user-select: none; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--fondo-oscuro);
            color: white;
            overflow: hidden;
            font-family: var(--fuente-lectura);
        }

        #canvas-estrellas {
            position: fixed; top: 0; left: 0; z-index: 0;
            background: radial-gradient(circle at center, #0d1b2a 0%, #000 100%);
        }

        .tarjeta {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 92%;
            max-width: 550px;
            background: var(--cristal);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 70px rgba(0,0,0,0.8);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tarjeta.activa {
            opacity: 1;
            pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }

        h1 {
            font-family: var(--fuente-elegante);
            font-size: 3rem;
            color: var(--celeste);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(179, 229, 252, 0.5);
        }

        /* SCROLLBAR CUSTOM */
        #contenedor-carta {
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 10px;
            text-align: left;
        }

        #contenedor-carta::-webkit-scrollbar { width: 5px; }
        #contenedor-carta::-webkit-scrollbar-thumb { background: var(--azul-brillante); border-radius: 10px; }

        #texto-carta {
            font-family: var(--fuente-manuscrita);
            font-size: 1.6rem;
            line-height: 1.3;
            white-space: pre-line;
        }

        /* BOTONES */
        .boton {
            font-family: var(--fuente-lectura);
            background: linear-gradient(45deg, #0277bd, #4fc3f7);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin: 5px;
        }

        .boton:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(79, 195, 247, 0.4);
        }

        .grid-detalles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        #cuadro-detalle {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-family: var(--fuente-manuscrita);
            font-size: 1.4rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--celeste);
        }

        /* ANIMACIONES AMBIENTE */
        .frase-flotante {
            position: fixed;
            font-family: var(--fuente-manuscrita);
            color: var(--celeste);
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 5;
            animation: subirFrase linear forwards;
        }

        @keyframes subirFrase {
            0% { transform: translateY(105vh); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-estrellas"></canvas>

    <div class="tarjeta activa" id="paso1">
        <h1>Hola, Isabella 🩵</h1>
        <p>Hice esto para recordarte lo especial que eres y para decirte lo que a veces no me sale con palabras...</p>
        <button class="boton" onclick="navegar(1, 2)">Abrir mi carta</button>
    </div>

    <div class="tarjeta" id="paso2">
        <h1>Para ti...</h1>
        <div id="contenedor-carta">
            <div id="texto-carta"></div>
            <div id="firma" style="opacity:0; transition: 2s; font-family: var(--fuente-elegante); font-size: 2.5rem; color: var(--celeste); margin-top: 20px; text-align: center;">
                Te amo, Migue.
            </div>
        </div>
        <button class="boton" id="btn-detalles" style="display:none;" onclick="navegar(2, 3)">Amo cada parte de vos</button>
    </div>

    <div class="tarjeta" id="paso3">
        <h1>Lo que me encanta...</h1>
        <p>Presiona cada botón para saber por qué eres perfecta para mí:</p>
        
        <div class="grid-detalles">
            <button class="boton" onclick="mostrarDetalle('ojos')">Tus Ojos</button>
            <button class="boton" onclick="mostrarDetalle('sonrisa')">Tu Sonrisa</button>
            <button class="boton" onclick="mostrarDetalle('ser')">Tu forma de ser</button>
            <button class="boton" onclick="mostrarDetalle('paz')">La paz que me das</button>
        </div>

        <div id="cuadro-detalle">Toca un botón arriba...</div>
        
        <div style="margin-top: 20px; font-family: var(--fuente-elegante); font-size: 2rem; color: var(--celeste);">
            Eres mi mundo entero.
        </div>
    </div>

    <script>
        // --- ESTRELLAS ---
        const canvas = document.getElementById('canvas-estrellas');
        const ctx = canvas.getContext('2d');
        let estrellas = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            estrellas = Array.from({length: 120}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 0.4 + 0.1,
                r: Math.random() * 1.2
            }));
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            estrellas.forEach(e => {
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
                e.y -= e.s; if(e.y < 0) e.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }

        // --- NAVEGACIÓN ---
        function navegar(actual, sig) {
            document.getElementById('paso' + actual).classList.remove('activa');
            setTimeout(() => {
                document.getElementById('paso' + sig).classList.add('activa');
                if(sig === 2) escribirCarta();
            }, 600);
        }

        // --- LÓGICA DE LA CARTA ---
        const textoCarta = "Isabella,\n\nDesde que llegaste a mi vida todo ha tenido color y sentido. Te has convertido en la mujer más especial para mí. Sé que tengo cosas por mejorar, pero lo haré porque no tengo duda de que quiero ser lo mejor para ustedes.\n\nPerdóname por todas las veces que te hago enojar o cuando no sé expresarme. Eres la mujer más perfecta que han visto mis ojos y por la cual mis pupilas se dilatan cada vez que te veo...";

        function escribirCarta() {
            let i = 0;
            const contenedor = document.getElementById('contenedor-carta');
            const caja = document.getElementById('texto-carta');
            
            function escribir() {
                if(i < textoCarta.length) {
                    caja.innerHTML += textoCarta.charAt(i);
                    i++;
                    contenedor.scrollTop = contenedor.scrollHeight;
                    setTimeout(escribir, 40);
                } else {
                    document.getElementById('firma').style.opacity = "1";
                    document.getElementById('btn-detalles').style.display = "inline-block";
                    lanzarMagia();
                }
            }
            escribir();
        }

        // --- DETALLES DINÁMICOS ---
        const detalles = {
            ojos: "Tus ojos son mi galaxia favorita. Tienen ese brillo único que me hipnotiza y es verdad lo que te digo: mis pupilas se dilatan solo de verte, porque eres lo más hermoso que he contemplado.",
            sonrisa: "Tu sonrisa es el sonido más lindo de mi mundo. Ver esa curva en tus labios me quita cualquier estrés y me recuerda que todo vale la pena si estás feliz.",
            ser: "Amo tu forma de ser, esa combinación de fuerza y dulzura. Eres auténtica, inteligente y la mujer que me inspira a ser alguien mejor cada día.",
            paz: "Contigo el mundo se detiene. Me das una paz que no encuentro en ningún otro lugar, eres mi refugio seguro y donde siempre quiero volver."
        };

        function mostrarDetalle(tipo) {
            const cuadro = document.getElementById('cuadro-detalle');
            cuadro.style.opacity = 0;
            setTimeout(() => {
                cuadro.innerHTML = detalles[tipo];
                cuadro.style.opacity = 1;
            }, 300);
        }

        function lanzarMagia() {
            const frases = ["Te amo", "Eres perfecta", "Pupilas dilatadas", "Mi Isabella", "🩵"];
            setInterval(() => {
                const f = document.createElement('div');
                f.className = 'frase-flotante';
                f.innerHTML = frases[Math.floor(Math.random() * frases.length)];
                f.style.left = Math.random() * 80 + 10 + 'vw';
                f.style.animationDuration = (Math.random() * 3 + 5) + 's';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 8000);
            }, 1000);
        }

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
